name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  docs-and-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce branch flow (PR destination main must come from develop)
        if: github.event_name == 'pull_request' && github.base_ref == 'main' && github.head_ref != 'develop'
        run: |
          echo "::error::Pull requests to main branch must originate from develop branch. (Your source is '${{ github.head_ref }}')"
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check documentation consistency
        run: npm run docs:check

      - name: Lint
        run: npm run lint
