name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-and-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check documentation consistency
        run: npm run docs:check

      - name: Lint
        run: npm run lint
