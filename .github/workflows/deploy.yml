# ============================================================
# Cloudflare Pages 自動デプロイ
# ============================================================
# main ブランチへのプッシュで自動デプロイされます。
#
# 【GitHub Secrets の設定（初回のみ）】
#   リポジトリ → Settings → Secrets and variables → Actions → New repository secret
#
#   CLOUDFLARE_API_TOKEN : Cloudflare Dashboard → My Profile → API Tokens
#                          テンプレート「Edit Cloudflare Workers」+ D1:Edit
#   CLOUDFLARE_ACCOUNT_ID: Cloudflare Dashboard 右サイドバー
# ============================================================

name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # 手動実行も可能

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare Pages
        run: npm run pages:build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=group-semi-2026
