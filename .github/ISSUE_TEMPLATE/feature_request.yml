name: Feature request
description: Suggest an improvement to the seminar calendar.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Other ways to solve this, if any.
  - type: textarea
    id: tradeoffs
    attributes:
      label: Risks / tradeoffs
      description: What might get worse or more complex?
  - type: textarea
    id: context
    attributes:
      label: Additional context
